<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cirion Prize Wheel</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-screen="home">
    <div class="page-backdrop" aria-hidden="true"></div>

    <button class="language-toggle" id="languageToggle" type="button" aria-label="">
      PT-BR
    </button>

    <main class="app-shell">
      <section class="screen start-screen screen--active" id="homeScreen" aria-labelledby="homeTitle">
        <div class="start-shell">
          <button class="start-logo-button" id="startButton" type="button" aria-labelledby="homeTitle">
            <img
              id="homeLogo"
              class="brand-logo brand-logo--hero"
              src="./assets/logo-white-transparent.png"
              alt="Cirion logo"
            />
          </button>
          <p class="start-shell__prompt" id="homeTitle">Tap to Start</p>
        </div>
      </section>

      <section
        class="screen registration-screen"
        id="formScreen"
        aria-labelledby="formTitle"
      >
        <div class="registration-shell">
          <header class="registration-header">
            <img
              id="formLogo"
              class="brand-logo brand-logo--header"
              src="./assets/logo-color.png"
              alt="Cirion logo"
            />
          </header>

          <div class="registration-stage">
            <div class="registration-copy">
              <h1 class="sr-only" id="formTitle">Register to spin the wheel</h1>
              <p class="registration-copy__lead" id="formLead">
                Complete your details and then spin the Cirion prize wheel.
              </p>
            </div>

            <div class="registration-panel">
              <form class="registration-form" id="leadForm" novalidate>
                <div class="field-grid field-grid--two">
                  <label class="field" data-field-name="firstName">
                    <input
                      id="firstName"
                      name="firstName"
                      type="text"
                      autocomplete="off"
                      inputmode="text"
                      data-keyboard="text"
                      placeholder="First Name*"
                    />
                    <small class="field-error" aria-live="polite"></small>
                  </label>

                  <label class="field" data-field-name="lastName">
                    <input
                      id="lastName"
                      name="lastName"
                      type="text"
                      autocomplete="off"
                      inputmode="text"
                      data-keyboard="text"
                      placeholder="Last Name*"
                    />
                    <small class="field-error" aria-live="polite"></small>
                  </label>
                </div>

                <label class="field" data-field-name="country">
                  <select id="country" name="country">
                    <option value="">Country (Select)*</option>
                  </select>
                  <small class="field-error" aria-live="polite"></small>
                </label>

                <label class="field" data-field-name="company">
                  <input
                    id="company"
                    name="company"
                    type="text"
                    autocomplete="off"
                    inputmode="text"
                    data-keyboard="text"
                    placeholder="Company*"
                  />
                  <small class="field-error" aria-live="polite"></small>
                </label>

                <label class="field" data-field-name="email">
                  <input
                    id="email"
                    name="email"
                    type="email"
                    autocomplete="off"
                    inputmode="email"
                    data-keyboard="email"
                    placeholder="Corporate Email*"
                  />
                  <small class="field-error" aria-live="polite"></small>
                </label>

                <label class="field" data-field-name="jobTitle">
                  <input
                    id="jobTitle"
                    name="jobTitle"
                    type="text"
                    autocomplete="off"
                    inputmode="text"
                    data-keyboard="text"
                    placeholder="Job Title"
                  />
                  <small class="field-error" aria-live="polite"></small>
                </label>

                <div class="field-grid field-grid--phone">
                  <label class="field" data-field-name="areaCode">
                    <input
                      id="areaCode"
                      name="areaCode"
                      type="text"
                      autocomplete="off"
                      inputmode="numeric"
                      data-keyboard="numeric"
                      placeholder="Area Code*"
                    />
                    <small class="field-error" aria-live="polite"></small>
                  </label>

                  <label class="field" data-field-name="phoneNumber">
                    <input
                      id="phoneNumber"
                      name="phoneNumber"
                      type="text"
                      autocomplete="off"
                      inputmode="numeric"
                      data-keyboard="numeric"
                      placeholder="Phone Number*"
                    />
                    <small class="field-error" aria-live="polite"></small>
                  </label>
                </div>

                <label class="field" data-field-name="reason">
                  <select id="reason" name="reason">
                    <option value="">Are you interested in Fiber or Data Center?</option>
                  </select>
                  <small class="field-error" aria-live="polite"></small>
                </label>

                <label class="check-field">
                  <input id="marketingConsent" name="marketingConsent" type="checkbox" checked />
                  <span id="marketingConsentLabel">
                    I want to receive information and offers about Cirion solutions and events.
                  </span>
                </label>

                <label class="check-field" data-field-name="privacyAccepted">
                  <input id="privacyAccepted" name="privacyAccepted" type="checkbox" />
                  <span id="privacyAcceptedLabel">
                    By submitting this form, I acknowledge the Cirion Privacy Notice.
                  </span>
                  <small class="field-error" aria-live="polite"></small>
                </label>

                <p class="form-feedback" id="formFeedback" hidden></p>

                <button class="primary-button" id="leadSubmitButton" type="submit">
                  Continue to Wheel
                </button>
              </form>
            </div>
          </div>
        </div>
      </section>

      <section class="screen" id="wheelScreen" aria-labelledby="wheelTitle">
        <div class="wheel-layout">
          <div class="wheel-stage-card">
            <span class="eyebrow eyebrow--dark" id="wheelEyebrow">Cirion Prize Wheel</span>
            <h2 id="wheelTitle">Tap the wheel to spin</h2>

            <div class="wheel-stage">
              <div class="wheel-pointer" id="wheelPointer" aria-hidden="true"></div>
              <button class="wheel" id="wheelButton" type="button" aria-label="Spin the wheel">
                <div class="wheel-rotor" id="wheelRotor">
                  <div class="wheel-face"></div>
                  <div class="wheel-labels" id="wheelLabels" aria-hidden="true"></div>
                </div>
                <div class="wheel-center">
                  <strong id="wheelCenterLabel">SPIN</strong>
                </div>
              </button>
            </div>

            <p class="sr-only" id="statusNote" aria-live="polite"></p>
          </div>
        </div>
      </section>
    </main>

    <section class="overlay" id="overlay" hidden aria-live="polite">
      <div class="overlay-card">
        <span class="eyebrow eyebrow--dark" id="overlayEyebrow">Result</span>
        <h3 id="overlayTitle">Round result</h3>
        <p id="overlayDescription"></p>
        <p class="overlay-countdown" id="overlayCountdown" hidden></p>

        <div class="overlay-actions">
          <button class="primary-button" id="overlayActionButton" type="button" hidden>
            Continue
          </button>
        </div>
      </div>
    </section>

    <section class="celebration" id="celebration" hidden aria-hidden="true"></section>

    <section class="keyboard" id="virtualKeyboard" hidden aria-label="Virtual keyboard">
      <div class="keyboard-shell" id="keyboardShell">
        <div class="keyboard-header">
          <button class="keyboard-close" id="keyboardCloseButton" type="button">Done</button>
        </div>
        <div class="keyboard-keys" id="keyboardKeys"></div>
      </div>
    </section>

    <script src="./app.js"></script>
  </body>
</html>
