<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cirion Prize Wheel</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-screen="home">
    <div class="page-backdrop" aria-hidden="true"></div>
    <button class="language-toggle" id="languageToggle" type="button" aria-label="">
      PT-BR
    </button>

    <main class="app-shell">
      <section class="screen screen--active" id="homeScreen" aria-labelledby="homeTitle">
        <div class="hero-card">
          <span class="eyebrow" id="homeEyebrow">Cirion interactive experience</span>
          <button
            class="logo-trigger logo-trigger--surface"
            id="startTrigger"
            type="button"
            aria-label="Start the Cirion prize wheel"
          >
            <span class="logo-clip logo-clip--hero">
              <img
                id="brandLogo"
                class="brand-logo brand-logo--hero"
                src="./assets/logo-blue-bg.png"
                alt="Cirion logo"
              />
            </span>
          </button>
          <h1 id="homeTitle">Tap the logo to play</h1>
          <p class="hero-copy" id="heroCopy">Spin the wheel and instantly see if you win.</p>
        </div>
      </section>

      <section class="screen" id="wheelScreen" aria-labelledby="wheelTitle">
        <div class="wheel-layout">
          <div class="wheel-stage-card">
            <span class="eyebrow eyebrow--dark" id="wheelEyebrow">Cirion Prize Wheel</span>
            <h2 id="wheelTitle">Tap the wheel to spin</h2>

            <div class="wheel-stage">
              <div class="wheel-pointer" aria-hidden="true"></div>
              <button
                class="wheel"
                id="wheelButton"
                type="button"
                aria-label="Spin the wheel"
              >
                <div class="wheel-rotor" id="wheelRotor">
                  <div class="wheel-face" id="wheelFace"></div>
                  <div class="wheel-labels" id="wheelLabels" aria-hidden="true"></div>
                </div>
                <div class="wheel-center">
                  <strong id="wheelCenterLabel">SPIN</strong>
                </div>
              </button>
            </div>

            <p class="sr-only" id="statusNote" aria-live="polite"></p>
          </div>
        </div>
      </section>
    </main>

    <section class="overlay" id="overlay" hidden aria-live="polite">
      <div class="overlay-card">
        <span class="eyebrow eyebrow--dark" id="overlayEyebrow">Result</span>
        <h3 id="overlayTitle">Round result</h3>
        <p id="overlayDescription"></p>

        <div class="overlay-actions">
          <button class="primary-button" id="overlayActionButton" type="button" hidden>
            Continue
          </button>
        </div>
      </div>
    </section>

    <section class="celebration" id="celebration" hidden aria-hidden="true"></section>

    <script src="./app.js"></script>
  </body>
</html>
